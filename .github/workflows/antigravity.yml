name: Antigravity CI/CD

on:
  workflow_dispatch:   # Permite dispararlo manualmente desde la pestaña Actions
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write   # 🔑 habilita push con GITHUB_TOKEN

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v1.2.0

      - name: Restore NuGet packages
        run: nuget restore Antigravity.sln

      - name: Build with MSBuild
        run: msbuild Antigravity.vbproj /p:Configuration=Release

      # Si tuvieras tests unitarios en proyectos .NET Core, podrías agregarlos aquí.
      # Para WebForms clásicos, normalmente no hay `dotnet test`.

  commit-generated:
    runs-on: ubuntu-latest
    needs: build-test   # Solo corre si la compilación pasó
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Crear archivo generado por IA
        run: echo "<h1>ABM CLIENTE generado automáticamente</h1>" > CLIENTE.aspx

      - name: Configurar Git
        run: |
          git config --global user.name "Antigravity Agent"
          git config --global user.email "agent@example.com"

      - name: Commit y push a rama feature/abm-cliente
        run: |
          git checkout -b feature/abm-cliente
          git add CLIENTE.aspx
          git commit -m "Agrego ABM CLIENTE generado por IA"
          git push origin feature/abm-cliente
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
