name: Antigravity CI/CD

on:
  workflow_dispatch:
    inputs:
      prompt_file:
        description: 'Archivo de prompt dentro de la carpeta prompts/'
        required: true
        default: 'abm-cliente.txt'
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v1.2.0

      - name: Restore NuGet packages
        run: nuget restore Antigravity.sln

      - name: Build with MSBuild
        run: msbuild Antigravity.vbproj /p:Configuration=Release

  commit-generated:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Configurar Git
        run: |
          git config --global user.name "Antigravity Agent"
          git config --global user.email "agent@example.com"

      - name: Preparar rama feature/generated
        run: |
          git fetch origin
          if git show-ref --verify --quiet refs/remotes/origin/feature/generated; then
            git checkout feature/generated
            git merge origin/feature/generated --no-edit || true
          else
            git checkout -b feature/generated
          fi

      - name: Generar código con IA (Ollama Granite)
        run: |
          PROMPT=$(cat prompts/${{ github.event.inputs.prompt_file }})
          RESPONSE=$(curl -s http://localhost:11434/api/generate \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"granite-code:latest\",
              \"prompt\": \"$PROMPT\",
              \"max_tokens\": 1500,
              \"stream\": false
            }" | jq -r '.response')

          echo "$RESPONSE" > Generated.aspx
          echo "$RESPONSE" > Generated.cs

      - name: Commit y push
        run: |
          git add Generated.aspx Generated.cs
          git commit -m "Código generado por IA a partir de prompt" || echo "No hay cambios para commitear"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} feature/generated
