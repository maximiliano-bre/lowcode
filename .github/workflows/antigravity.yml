name: Antigravity CI/CD

on:
  workflow_dispatch:
    inputs:
      prompt_file:
        description: 'Archivo de prompt dentro de la carpeta prompts/'
        required: true
        default: 'abm-cliente.txt'
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v1.2.0

      - name: Restore NuGet packages
        run: nuget restore Antigravity.sln

      - name: Build with MSBuild
        run: msbuild Antigravity.vbproj /p:Configuration=Release

  commit-generated:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generar código con IA
        run: |
          PROMPT=$(cat prompts/${{ github.event.inputs.prompt_file }})
          RESPONSE=$(curl -s https://api.openai.com/v1/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
            -d "{
              \"model\": \"text-davinci-003\",
              \"prompt\": \"$PROMPT\",
              \"max_tokens\": 1500
            }" | jq -r '.choices[0].text')

          echo "$RESPONSE" > Generated.aspx
          echo "$RESPONSE" > Generated.cs

      - name: Configurar Git
        run: |
          git config --global user.name "Antigravity Agent"
          git config --global user.email "agent@example.com"

     - name: Commit y push a rama feature/generated
      run: |
        git fetch origin
        git checkout feature/generated || git checkout -b feature/generated
        git pull origin feature/generated || true
        git add Generated.aspx Generated.cs
        git commit -m "Código generado por IA a partir de prompt" || echo "No hay cambios para commitear"
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} feature/generated

